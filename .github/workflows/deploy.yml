name: Deploy to GitHub Pages

on:
  # 推送到 main 时自动部署（把功能分支合并到 main 即可触发）
  push:
    branches: [main]
  # 也可在 Actions 页面手动触发（可选择任意分支，便于合并前预览）
  workflow_dispatch:

# 允许此工作流向 Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署；不取消进行中的发布
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          # 用仓库实际名字作为 basePath，自动适配重命名 / fork
          PAGES_BASE_PATH: ${{ github.event.repository.name }}
        run: npm run build

      # 通过 artifact 部署本身不会运行 Jekyll；保险起见仍放一个 .nojekyll，
      # 以免 _next 目录被忽略。
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
